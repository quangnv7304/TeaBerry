{% extends "base.html" %}

{% block title %}Kiểm tra email – TeaBerry{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="card border-0 shadow-sm mx-auto" style="max-width: 520px;">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h3 fw-bold">Kiểm tra email của bạn</h1>
            <p class="text-muted">
                Nếu email tồn tại trong hệ thống, chúng tôi đã gửi hướng dẫn đặt lại mật khẩu.
                Hãy kiểm tra cả thư mục spam.
            </p>
            <a class="btn btn-outline-secondary" href="{% url 'accounts:login' %}">
                Quay lại đăng nhập
            </a>
        </div>
    </div>
</section>
{% endblock %}
