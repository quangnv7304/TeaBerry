{% extends "base.html" %}

{% block title %}Đặt lại mật khẩu thành công – TeaBerry{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="card border-0 shadow-sm mx-auto" style="max-width: 520px;">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h3 fw-bold">Mật khẩu đã được cập nhật</h1>
            <p class="text-muted">Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.</p>
            <a class="btn btn-teaberry" href="{% url 'accounts:login' %}">
                Đăng nhập
            </a>
        </div>
    </div>
</section>
{% endblock %}
