services:
  - type: web
    name: teaberry
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6

      - key: DJANGO_DEBUG
        value: "False"

      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DJANGO_ALLOWED_HOSTS
        value: teaberry.onrender.com

      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://teaberry.onrender.com
